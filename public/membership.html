<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Membership - Be More Fit</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo-section">
                <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <circle cx="20" cy="50" r="8" fill="url(#logoGradient)"/>
                    <rect x="28" y="48" width="44" height="4" fill="url(#logoGradient)"/>
                    <circle cx="80" cy="50" r="8" fill="url(#logoGradient)"/>
                    <path d="M 35 30 Q 50 15 65 30" stroke="url(#logoGradient)" stroke-width="2" fill="none"/>
                    <path d="M 35 70 Q 50 85 65 70" stroke="url(#logoGradient)" stroke-width="2" fill="none"/>
                </svg>
                <h1>Be More Fit</h1>
            </div>
            <ul class="nav-links">
                <li><a href="/dashboard" class="btn-login">Dashboard</a></li>
                <li><a href="#" onclick="logout()" class="btn-signup">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="membership-section">
            <h1>Choose Your Membership Plan</h1>
            <p class="subtitle">Select the perfect plan for your fitness journey</p>

            <div class="plans-grid" id="plansContainer">
                <!-- Plans will be loaded here -->
            </div>

            <div class="form-message" id="formMessage"></div>
        </div>
    </div>

    <footer class="footer">
        <p>© 2024 Be More Fit. Created by Jatin Sanap & Adarsh Patil.</p>
    </footer>

    <script>
        async function loadPlans() {
            try {
                const response = await fetch('/api/members/plans');
                const plans = await response.json();

                const container = document.getElementById('plansContainer');
                container.innerHTML = '';

                plans.forEach(plan => {
                    const planCard = document.createElement('div');
                    planCard.className = 'plan-card-detailed';
                    if (plan.type === 'elite') planCard.classList.add('featured');

                    const featuresHTML = plan.features.map(f => `<li>✓ ${f}</li>`).join('');

                    planCard.innerHTML = `
                        <div class="plan-badge">${plan.duration === 1 ? 'Monthly' : plan.duration + ' Months'}</div>
                        <h3>${plan.name}</h3>
                        <div class="plan-price">₹${plan.cost.toLocaleString()}</div>
                        <ul class="plan-features">
                            ${featuresHTML}
                        </ul>
                        <button class="btn-primary full-width" onclick="selectPlan('${plan.type}')">Select Plan</button>
                    `;

                    container.appendChild(planCard);
                });
            } catch (error) {
                console.error('Error loading plans:', error);
            }
        }

        async function selectPlan(planType) {
            const token = localStorage.getItem('token');
            const messageDiv = document.getElementById('formMessage');

            try {
                const response = await fetch('/api/members/membership', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ planType })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.style.color = '#00d4ff';
                    messageDiv.textContent = 'Membership activated! Redirecting to dashboard...';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    messageDiv.style.color = '#ff006e';
                    messageDiv.textContent = data.message || 'Failed to activate membership';
                }
            } catch (error) {
                messageDiv.style.color = '#ff006e';
                messageDiv.textContent = 'An error occurred. Please try again.';
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        loadPlans();
    </script>
</body>
</html>
